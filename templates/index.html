<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸣潮抽卡分析器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=7">
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <header class="header">
            <h1>鸣潮抽卡分析器</h1>
            <p>粘贴抽卡链接 JSON，分析你的抽卡历史</p>
        </header>

        <!-- 输入区域 -->
        <section class="card input-section">
            <div class="card-title">📝 输入抽卡链接</div>
            <textarea
                id="gachaLink"
                placeholder='粘贴抓包获取的 JSON，例如：&#10;{"playerId":"120138348","serverId":"76402e5b...","recordId":"3113aac1...","languageCode":"zh-Hans"}'
                rows="5"
            ></textarea>
            <div class="input-actions">
                <button class="analyze-btn" onclick="analyze()">开始分析</button>
                <button class="clear-btn" onclick="clearInput()">清空</button>
            </div>
        </section>

        <!-- 使用帮助 -->
        <section class="card">
            <div class="help-toggle" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
                ❓ 如何获取抽卡数据？
            </div>
            <div class="help-content" style="display: none;">
                <ol>
                    <li>打开鸣潮游戏，进入<strong>唤取</strong>（抽卡）界面</li>
                    <li>点击历史记录按钮，打开抽卡历史页面</li>
                    <li>使用抓包工具（如 Fiddler、Charles）捕获网络请求</li>
                    <li>找到包含 <code>gacha/record/query</code> 的请求</li>
                    <li>复制请求体 JSON 粘贴到上方输入框</li>
                </ol>
            </div>
        </section>

        <!-- 总结区域 -->
        <div id="summary"></div>

        <!-- 结果区域 -->
        <section class="card">
            <div class="card-title">📊 分析结果</div>
            <div id="result">
                <div class="empty">粘贴抽卡链接后点击「开始分析」</div>
            </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}?v=7"></script>
</body>
</html>
